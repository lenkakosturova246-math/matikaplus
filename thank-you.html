<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ďakujeme</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 60px 20px;
      background: #202d3a;
      color: white;
    }
    .box {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      color: #202d3a;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      background: #202d3a;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Ďakujeme!</h1>
    <p>Vaša správa bola úspešne odoslaná.</p>
    <a href="index.html">Späť na stránku</a>
  </div>
</body>
</html>
