<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATIKA + - Matematika pre deti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #202d3a;
            color: white;
        }
        .logo {
            max-width: 300px;
            margin-bottom: 20px;
        }
        .navbar {
            background-color: #1a212a !important;
        }
    </style>
</head>
<body>

    <!-- Navigácia -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">MATIKA +</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#home">Domov</a></li>
                    <li class="nav-item"><a class="nav-link" href="#kurzy">Kurzy</a></li>
                    <li class="nav-item"><a class="nav-link" href="#kontakt">Kontakt</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hlavná sekcia -->
    <section id="home" class="py-5 text-center">
        <div class="container">
            <img src="matika.png" alt="Logo" class="logo">
            <h1 class="display-4">MATIKA +</h1>
            <p class="lead">Matematika pre deti od 2–15 rokov</p>
            <button class="btn btn-primary btn-lg">Skúsiť bezplatne</button>
        </div>
    </section>

    <!-- Kurzy -->
    <section id="kurzy" class="py-5 bg-dark">
        <div class="container">
            <h2 class="text-center mb-5">Naše kurzy</h2>
            <div class="row">
                <div class="col-md-4">
                    <div class="card bg-secondary text-white">
                        <div class="card-body">
                            <h5 class="card-title">Základy (2-5 r.)</h5>
                            <p class="card-text">Počítanie, čísla, základné operácie</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-secondary text-white">
                        <div class="card-body">
                            <h5 class="card-title">Stredný úroveň (6-10 r.)</h5>
                            <p class="card-text">Geometria, zlomky, rovnice</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-secondary text-white">
                        <div class="card-body">
                            <h5 class="card-title">Pokročilý (11-15 r.)</h5>
                            <p class="card-text">Algebra, trigonometria, funkcie</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Kontakt -->
    <section id="kontakt" class="py-5">
        <div class="container">
            <h2 class="text-center mb-5">Kontaktuj nás</h2>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <form>
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Meno" required>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" placeholder="Email" required>
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" rows="5" placeholder="Správa" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Poslať</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
